services:
  avd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: avd
    restart: unless-stopped
    environment:
      AVD_PROXY: ${AVD_PROXY:-}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
